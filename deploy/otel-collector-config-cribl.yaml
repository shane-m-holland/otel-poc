receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  resource:
    attributes:
      - key: deployment.environment
        value: "poc"
        action: upsert
      - key: pipeline
        value: "otel-collector-cribl"
        action: insert

exporters:
  otlphttp/cribl:
    endpoint: "http://cribl:10080"
    tls:
      insecure: true

  otlphttp/grafana:
    endpoint: "http://grafana-lgtm:4318"
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: "info"

  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/cribl, debug]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/cribl, debug]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/cribl, debug]
