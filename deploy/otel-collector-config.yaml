receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  resource:
    attributes:
      - key: deployment.environment
        value: "poc"
        action: upsert
      - key: pipeline
        value: "otel-collector"
        action: insert

exporters:
  # Default path: Collector → Grafana LGTM
  otlphttp/grafana:
    endpoint: "http://grafana-lgtm:4318"
    tls:
      insecure: true

  # Optional Cribl path (enabled via --profile cribl; uncomment pipelines below)
  # otlphttp/cribl:
  #   endpoint: "http://cribl:10080"
  #   tls:
  #     insecure: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: "info"

  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/grafana, debug]
      # To route through Cribl instead, replace exporters with: [otlphttp/cribl, debug]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/grafana, debug]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/grafana, debug]
